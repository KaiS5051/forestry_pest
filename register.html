<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账号 - 林业害虫智能识别系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0d1f17 0%, #1a472a 50%, #2d5a3d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .register-container {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .register-header {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.3), rgba(26, 71, 42, 0.8));
            padding: 40px;
            text-align: center;
        }

        .register-header h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 10px;
        }

        .register-header p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }

        .register-form {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: white;
            transition: all 0.3s;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #4caf50, #388e3c);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.3);
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(76, 175, 80, 0.4);
        }

        .back-login {
            text-align: center;
            margin-top: 20px;
        }

        .back-login a {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-decoration: none;
        }

        .back-login a:hover {
            color: #4caf50;
        }

        .error-msg, .success-msg {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-msg {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #ef5350;
        }

        .success-msg {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        @media (max-width: 768px) {
            .register-header, .register-form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>注册账号</h1>
            <p>创建您的研究员账号，开始害虫检测之旅</p>
        </div>

        <div class="register-form">
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名（3-20位）" required minlength="3" maxlength="20">
                </div>

                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" placeholder="请输入邮箱地址" required>
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码（6位以上）" required minlength="6">
                </div>

                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" name="confirmPassword" placeholder="请再次输入密码" required>
                </div>

                <button type="submit" class="btn-register">注册账号</button>
            </form>

            <div class="back-login">
                <a href="/user/login">← 已有账号？返回登录</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const password = formData.get('password');
            const confirmPassword = formData.get('confirmPassword');
            
            if (password !== confirmPassword) {
                document.getElementById('errorMsg').textContent = '两次输入的密码不一致';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('successMsg').style.display = 'none';
                return;
            }
            
            const data = {
                username: formData.get('username'),
                email: formData.get('email'),
                password: password,
                confirmPassword: confirmPassword
            };

            try {
                const response = await fetch('/api/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.code === 200) {
                    document.getElementById('successMsg').textContent = '注册成功！即将跳转到登录页面...';
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('errorMsg').style.display = 'none';
                    setTimeout(() => {
                        location.href = '/user/login';
                    }, 1500);
                } else {
                    document.getElementById('errorMsg').textContent = result.message;
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('successMsg').style.display = 'none';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = '网络错误，请稍后重试';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('successMsg').style.display = 'none';
            }
        });
    </script>
</body>
</html>
